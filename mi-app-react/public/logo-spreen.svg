<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0618"/>
    </radialGradient>

    <!-- Petal gradient - pink to white -->
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6e7"/>
      <stop offset="100%" style="stop-color:#ff8fb1"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe4f0"/>
      <stop offset="100%" style="stop-color:#ffadc8"/>
    </linearGradient>
    <linearGradient id="petal3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc2d8"/>
      <stop offset="100%" style="stop-color:#ff7aa0"/>
    </linearGradient>
    <linearGradient id="petal4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd9ea"/>
      <stop offset="100%" style="stop-color:#ffb3cc"/>
    </linearGradient>
    <linearGradient id="petal5" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffc8de"/>
      <stop offset="100%" style="stop-color:#ff96b8"/>
    </linearGradient>

    <!-- Gold center -->
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff5c0"/>
      <stop offset="60%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#e6a800"/>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="petalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>

  <!-- Outer geometric hexagon ring -->
  <polygon points="100,18 168,58 168,138 100,178 32,138 32,58"
    fill="none" stroke="#3d1f5e" stroke-width="1" opacity="0.6"/>

  <!-- Inner geometric ring -->
  <polygon points="100,34 152,64 152,134 100,164 48,134 48,64"
    fill="none" stroke="#5a2d82" stroke-width="0.7" opacity="0.4"/>

  <!-- Geometric connecting lines (mandala-like) -->
  <line x1="100" y1="18" x2="100" y2="178" stroke="#3d1f5e" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="58" x2="168" y2="138" stroke="#3d1f5e" stroke-width="0.5" opacity="0.3"/>
  <line x1="168" y1="58" x2="32" y2="138" stroke="#3d1f5e" stroke-width="0.5" opacity="0.3"/>

  <!-- Tiny decorative dots on hexagon vertices -->
  <circle cx="100" cy="18" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="168" cy="58" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="168" cy="138" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="100" cy="178" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="32" cy="138" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="32" cy="58" r="2" fill="#7c3aed" opacity="0.5"/>

  <!-- ==============================
       CHERRY BLOSSOM — 5 petals
       Each petal is a rounded ellipse rotated around center
  ============================== -->

  <!-- Petal 1 — top -->
  <g transform="rotate(0, 100, 100)">
    <ellipse cx="100" cy="70" rx="16" ry="24" fill="url(#petal1)" filter="url(#petalGlow)"/>
    <!-- Petal detail line -->
    <line x1="100" y1="94" x2="100" y2="58" stroke="white" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Petal 2 — upper right -->
  <g transform="rotate(72, 100, 100)">
    <ellipse cx="100" cy="70" rx="16" ry="24" fill="url(#petal2)" filter="url(#petalGlow)"/>
    <line x1="100" y1="94" x2="100" y2="58" stroke="white" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Petal 3 — lower right -->
  <g transform="rotate(144, 100, 100)">
    <ellipse cx="100" cy="70" rx="16" ry="24" fill="url(#petal3)" filter="url(#petalGlow)"/>
    <line x1="100" y1="94" x2="100" y2="58" stroke="white" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Petal 4 — lower left -->
  <g transform="rotate(216, 100, 100)">
    <ellipse cx="100" cy="70" rx="16" ry="24" fill="url(#petal4)" filter="url(#petalGlow)"/>
    <line x1="100" y1="94" x2="100" y2="58" stroke="white" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Petal 5 — upper left -->
  <g transform="rotate(288, 100, 100)">
    <ellipse cx="100" cy="70" rx="16" ry="24" fill="url(#petal5)" filter="url(#petalGlow)"/>
    <line x1="100" y1="94" x2="100" y2="58" stroke="white" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- Petal notch lines (top of each petal) -->
  <g transform="rotate(0, 100, 100)"><line x1="94" y1="56" x2="100" y2="50" stroke="#ff8fb1" stroke-width="1" opacity="0.5" stroke-linecap="round"/><line x1="106" y1="56" x2="100" y2="50" stroke="#ff8fb1" stroke-width="1" opacity="0.5" stroke-linecap="round"/></g>
  <g transform="rotate(72, 100, 100)"><line x1="94" y1="56" x2="100" y2="50" stroke="#ffadc8" stroke-width="1" opacity="0.5" stroke-linecap="round"/><line x1="106" y1="56" x2="100" y2="50" stroke="#ffadc8" stroke-width="1" opacity="0.5" stroke-linecap="round"/></g>
  <g transform="rotate(144, 100, 100)"><line x1="94" y1="56" x2="100" y2="50" stroke="#ff7aa0" stroke-width="1" opacity="0.5" stroke-linecap="round"/><line x1="106" y1="56" x2="100" y2="50" stroke="#ff7aa0" stroke-width="1" opacity="0.5" stroke-linecap="round"/></g>
  <g transform="rotate(216, 100, 100)"><line x1="94" y1="56" x2="100" y2="50" stroke="#ffb3cc" stroke-width="1" opacity="0.5" stroke-linecap="round"/><line x1="106" y1="56" x2="100" y2="50" stroke="#ffb3cc" stroke-width="1" opacity="0.5" stroke-linecap="round"/></g>
  <g transform="rotate(288, 100, 100)"><line x1="94" y1="56" x2="100" y2="50" stroke="#ff96b8" stroke-width="1" opacity="0.5" stroke-linecap="round"/><line x1="106" y1="56" x2="100" y2="50" stroke="#ff96b8" stroke-width="1" opacity="0.5" stroke-linecap="round"/></g>

  <!-- Center golden circle -->
  <circle cx="100" cy="100" r="14" fill="url(#center)" filter="url(#glow)"/>

  <!-- Center stamens -->
  <g opacity="0.9">
    <line x1="100" y1="100" x2="100" y2="88" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="100" cy="87" r="1.8" fill="#ffd700"/>

    <line x1="100" y1="100" x2="110" y2="94" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="111" cy="93" r="1.8" fill="#ffd700"/>

    <line x1="100" y1="100" x2="108" y2="108" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="109" cy="109" r="1.8" fill="#ffd700"/>

    <line x1="100" y1="100" x2="100" y2="112" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="100" cy="113" r="1.8" fill="#ffd700"/>

    <line x1="100" y1="100" x2="92" y2="108" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="91" cy="109" r="1.8" fill="#ffd700"/>

    <line x1="100" y1="100" x2="90" y2="94" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
    <circle cx="89" cy="93" r="1.8" fill="#ffd700"/>
  </g>

  <!-- Center highlight -->
  <circle cx="97" cy="97" r="4" fill="white" opacity="0.25"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ff8fb1" stroke-width="0.8" opacity="0.2" filter="url(#softglow)"/>
</svg>
